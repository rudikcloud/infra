services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rudikcloud}
      POSTGRES_USER: ${POSTGRES_USER:-rudik}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rudik}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.102.1
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT:-4318}:4318"

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "${TEMPO_PORT:-3200}:3200"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  auth-service:
    build:
      context: ../auth-service
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql://rudik:rudik@postgres:5432/rudikcloud}
      REDIS_URL: ${AUTH_REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${AUTH_JWT_SECRET:-dev-only-change-me}
      JWT_ISSUER: ${AUTH_JWT_ISSUER:-rudikcloud-auth}
      CORS_ORIGINS: ${AUTH_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-auth_session}
      SESSION_TTL_SECONDS: ${AUTH_SESSION_TTL_SECONDS:-86400}
      COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      PORT: 8000
    ports:
      - "${AUTH_SERVICE_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard
    environment:
      NEXT_PUBLIC_AUTH_BASE_URL: ${NEXT_PUBLIC_AUTH_BASE_URL:-http://localhost:8001}
      AUDIT_SERVICE_URL: ${AUDIT_SERVICE_URL:-http://audit-service-java:8000}
      AUDIT_INGEST_TOKEN: ${AUDIT_INGEST_TOKEN:-dev-audit-token}
      PORT: 3000
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      auth-service:
        condition: service_healthy

  orders-service:
    build:
      context: ../orders-service
    environment:
      DATABASE_URL: ${ORDERS_DATABASE_URL:-postgresql://rudik:rudik@postgres:5432/rudikcloud}
      REDIS_URL: ${ORDERS_REDIS_URL:-redis://redis:6379/0}
      ORDERS_EVENTS_STREAM: ${ORDERS_EVENTS_STREAM:-orders.events}
      AUDIT_BASE_URL: ${AUDIT_SERVICE_URL:-http://audit-service-java:8000}
      AUDIT_INGEST_TOKEN: ${AUDIT_INGEST_TOKEN:-dev-audit-token}
      AUDIT_REQUEST_TIMEOUT_SECONDS: ${ORDERS_AUDIT_REQUEST_TIMEOUT_SECONDS:-5}
      AUTH_SERVICE_URL: ${ORDERS_AUTH_SERVICE_URL:-http://auth-service:8000}
      AUTH_REQUEST_TIMEOUT_SECONDS: ${ORDERS_AUTH_REQUEST_TIMEOUT_SECONDS:-5}
      FLAGS_SERVICE_URL: ${ORDERS_FLAGS_SERVICE_URL:-http://flags-service:8000}
      FLAGS_REQUEST_TIMEOUT_SECONDS: ${ORDERS_FLAGS_REQUEST_TIMEOUT_SECONDS:-5}
      PORT: 8002
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/health').status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  flags-service:
    build:
      context: ../flags-service
    environment:
      DATABASE_URL: ${FLAGS_DATABASE_URL:-postgresql://rudik:rudik@postgres:5432/rudikcloud}
      AUDIT_BASE_URL: ${AUDIT_SERVICE_URL:-http://audit-service-java:8000}
      AUDIT_INGEST_TOKEN: ${AUDIT_INGEST_TOKEN:-dev-audit-token}
      AUDIT_REQUEST_TIMEOUT_SECONDS: ${FLAGS_AUDIT_REQUEST_TIMEOUT_SECONDS:-5}
      AUTH_SERVICE_URL: ${FLAGS_AUTH_SERVICE_URL:-http://auth-service:8000}
      AUTH_REQUEST_TIMEOUT_SECONDS: ${FLAGS_AUTH_REQUEST_TIMEOUT_SECONDS:-5}
      PORT: 8000
    ports:
      - "${FLAGS_SERVICE_PORT:-8003}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  audit-service-java:
    build:
      context: ../audit-service-java
    environment:
      DATABASE_URL: ${AUDIT_DATABASE_URL:-jdbc:postgresql://postgres:5432/rudikcloud?user=rudik&password=rudik}
      AUDIT_INGEST_TOKEN: ${AUDIT_INGEST_TOKEN:-dev-audit-token}
      PORT: 8000
    ports:
      - "${AUDIT_SERVICE_PORT:-8004}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  notifications-worker:
    build:
      context: ../notifications-worker
    environment:
      DATABASE_URL: ${NOTIFICATIONS_DATABASE_URL:-postgresql://rudik:rudik@postgres:5432/rudikcloud}
      REDIS_URL: ${NOTIFICATIONS_REDIS_URL:-redis://redis:6379/0}
      ORDERS_EVENTS_STREAM: ${NOTIFICATIONS_ORDERS_EVENTS_STREAM:-orders.events}
      ORDERS_RETRY_ZSET: ${NOTIFICATIONS_ORDERS_RETRY_ZSET:-orders.retry}
      ORDERS_DLQ_STREAM: ${NOTIFICATIONS_ORDERS_DLQ_STREAM:-orders.dlq}
      MAX_ATTEMPTS: ${NOTIFICATIONS_MAX_ATTEMPTS:-5}
      WORKER_POLL_INTERVAL_MS: ${NOTIFICATIONS_WORKER_POLL_INTERVAL_MS:-500}
      FAIL_MODE: ${NOTIFICATIONS_FAIL_MODE:-off}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      orders-service:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  grafana_data:
