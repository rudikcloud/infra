name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        run: cp .env.example .env

      - name: Validate Docker Compose
        run: docker compose config
